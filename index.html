<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="frame">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search" class="search-input">
        </div>
        <div class="icons">
          <span class="bell">🛎️</span>
          <div class="avatar">IG</div>
        </div>
      </div>

      <h1 class="title">Accounts</h1>

      <!-- Account List -->
      <div class="account-list">

        <!-- Dropbox -->
        <div class="account-item">
          <div class="logo-section">
            <img src="img/image 1.png" 
                 alt="Dropbox" class="logo">
            <div class="info">
              <div class="name">Dropbox</div>
              <div class="domain">dropbox.com</div>
            </div>
          </div>
          <div class="middle"></div>
          <div class="right-section">
            <div class="count">24 accounts</div>
            <div class="dots">⋯</div>
          </div>
        </div>

        <!-- Pinterest -->
        <div class="account-item">
          <div class="logo-section">
            <img src="img/image 2.png" 
                 alt="Pinterest" class="logo">
            <div class="info">
              <div class="name">Pinterest</div>
              <div class="domain">pinterest.com</div>
            </div>
          </div>
          <div class="middle"></div>
          <div class="right-section">
            <div class="count">3 accounts</div>
            <div class="dots">⋯</div>
          </div>
        </div>

        <!-- Microsoft -->
        <div class="account-item">
          <div class="logo-section">
            <img src="img/image 3.png" 
                 alt="Microsoft" class="logo">
            <div class="info">
              <div class="name">Microsoft</div>
              <div class="domain">microsoft.com</div>
            </div>
          </div>
          <div class="middle"></div>
          <div class="right-section">
            <div class="count">19 accounts</div>
            <div class="dots">⋯</div>
          </div>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
